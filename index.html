<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader Pessoal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .buttons {
            display: flex;
            justify-content: space-around;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #btn-mp3 {
            background-color: #1db954;
            color: white;
        }
        #btn-mp4 {
            background-color: #e50914;
            color: white;
        }
        button:hover { opacity: 0.8; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Baixar do YouTube</h2>
    <input type="text" id="yt-url" placeholder="Cole o link do vídeo aqui...">
    
    <div class="buttons">
        <button id="btn-mp3" onclick="iniciarDownload('mp3')">Baixar MP3</button>
        <button id="btn-mp4" onclick="iniciarDownload('mp4')">Baixar MP4</button>
    </div>

    <div id="status"></div>
</div>

<script>
    // --- SUBSTITUA PELAS SUAS CREDENCIAIS DO RAPIDAPI ---
    const RAPIDAPI_KEY = '53437ea1famsh3af8f3a44a02dd4p1fcc2ejsn9ebe5c3a2bef'; 
    const RAPIDAPI_HOST = 'youtube-media-downloader.p.rapidapi.com'; // Ex: youtube-mp36.p.rapidapi.com

    async function iniciarDownload(formato) {
        const urlInput = document.getElementById('yt-url').value;
        const statusDiv = document.getElementById('status');

        if (!urlInput) {
            statusDiv.innerText = "Por favor, insira um link válido.";
            statusDiv.style.color = "red";
            return;
        }

        statusDiv.innerText = `Processando ${formato.toUpperCase()}... Aguarde.`;
        statusDiv.style.color = "#333";

        // NOTA: A URL de fetch abaixo depende de qual API exata você escolheu no RapidAPI.
        // O exemplo abaixo é genérico e serve para ilustrar a lógica. Você deve
        // copiar o "Code Snippet" exato fornecido pela aba "Endpoints" do RapidAPI.
        const urlApi = `https://${RAPIDAPI_HOST}/endpoint_da_api?url=${encodeURIComponent(urlInput)}&format=${formato}`;
        
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': RAPIDAPI_KEY,
                'x-rapidapi-host': RAPIDAPI_HOST
            }
        };

        try {
            const response = await fetch(urlApi, options);
            const data = await response.json();

            // A API geralmente retorna um JSON contendo o link direto de download (ex: data.link ou data.url)
            // Verifique a documentação da sua API escolhida para saber o nome exato da variável de retorno.
            if (data.link) { 
                statusDiv.innerText = "Pronto! Iniciando download...";
                statusDiv.style.color = "green";
                
                // Abre o link retornado pela API em uma nova aba, o que inicia o download no navegador
                window.open(data.link, '_blank');
            } else {
                statusDiv.innerText = "Erro ao gerar o link. Tente outro vídeo.";
                statusDiv.style.color = "red";
            }
        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Erro de conexão com o servidor.";
            statusDiv.style.color = "red";
        }
    }
</script>

</body>
</html>
