<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader Pessoal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .buttons {
            display: flex;
            justify-content: space-around;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #btn-mp3 {
            background-color: #1db954;
            color: white;
        }
        #btn-mp4 {
            background-color: #e50914;
            color: white;
        }
        button:hover { opacity: 0.8; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Baixar do YouTube</h2>
    <input type="text" id="yt-url" placeholder="Cole o link do vídeo aqui...">
    
    <div class="buttons">
        <button id="btn-mp3" onclick="iniciarDownload('mp3')">Baixar MP3</button>
        <button id="btn-mp4" onclick="iniciarDownload('mp4')">Baixar MP4</button>
    </div>

    <div id="status"></div>
</div>

<script>
    // Suas credenciais da RapidAPI
    const RAPIDAPI_KEY = '53437ea1famsh3af8f3a44a02dd4p1fcc2ejsn9ebe5c3a2bef'; 
    const RAPIDAPI_HOST = 'youtube-media-downloader.p.rapidapi.com';

    // Função para extrair o ID de qualquer formato de link do YouTube
    function extrairVideoId(url) {
        const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    async function iniciarDownload(formato) {
        const urlInput = document.getElementById('yt-url').value;
        const statusDiv = document.getElementById('status');

        const videoId = extrairVideoId(urlInput);

        if (!videoId) {
            statusDiv.innerText = "Link inválido. Por favor, cole a URL completa de um vídeo do YouTube.";
            statusDiv.style.color = "red";
            return;
        }

        statusDiv.innerText = `Processando ${formato.toUpperCase()}... Aguarde.`;
        statusDiv.style.color = "#333";

        // URL da API dinâmica baseada no ID extraído
        const urlApi = `https://${RAPIDAPI_HOST}/v2/video/details?videoId=${videoId}&urlAccess=normal&videos=auto&audios=auto`;
        
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': RAPIDAPI_KEY,
                'x-rapidapi-host': RAPIDAPI_HOST
            }
        };

        try {
            const response = await fetch(urlApi, options);
            const data = await response.json();
            
            // Inspecione o objeto completo no console do navegador para entender a estrutura
            console.log("Resposta da API:", data);

            let linkDownload = null;

            // Lógica de navegação no JSON (Pode variar dependendo da estrutura exata da API)
            if (formato === 'mp4' && data.videos && data.videos.length > 0) {
                // Pega a primeira opção de vídeo disponível
                linkDownload = data.videos[0].url; 
            } else if (formato === 'mp3' && data.audios && data.audios.length > 0) {
                // Pega a primeira opção de áudio disponível
                linkDownload = data.audios[0].url; 
            }

            if (linkDownload) { 
                statusDiv.innerText = "Pronto! Iniciando download...";
                statusDiv.style.color = "green";
                
                // Redireciona o usuário para o link direto do arquivo
                window.location.href = linkDownload;
            } else {
                statusDiv.innerText = "Formato não encontrado ou indisponível para este vídeo.";
                statusDiv.style.color = "red";
            }
        } catch (error) {
            console.error("Erro na requisição:", error);
            statusDiv.innerText = "Erro de conexão com o servidor. Tente novamente.";
            statusDiv.style.color = "red";
        }
    }
</script>
    
</body>
</html>
