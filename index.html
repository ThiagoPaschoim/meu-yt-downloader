<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader com Corte</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .time-inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            width: 95%;
            margin-left: auto;
            margin-right: auto;
        }
        .time-inputs div {
            display: flex;
            flex-direction: column;
            text-align: left;
            width: 48%;
        }
        .time-inputs label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        .time-inputs input {
            width: 80%;
            margin-bottom: 0;
        }
        .buttons {
            display: flex;
            justify-content: space-around;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #btn-mp3 {
            background-color: #1db954;
            color: white;
        }
        #btn-mp4 {
            background-color: #e50914;
            color: white;
        }
        button:hover { opacity: 0.8; }
        #status { margin-top: 20px; font-weight: bold; font-size: 14px; }
        .aviso { font-size: 12px; color: #777; margin-top: 15px;}
    </style>
</head>
<body>

<div class="container">
    <h2>Baixar do YouTube</h2>
    
    <input type="text" id="yt-url" placeholder="Cole o link do vídeo aqui...">
    
    <div class="time-inputs">
        <div>
            <label for="start-time">Tempo de Início:</label>
            <input type="text" id="start-time" value="00:00:00" placeholder="00:00:00">
        </div>
        <div>
            <label for="end-time">Tempo de Fim (Opcional):</label>
            <input type="text" id="end-time" placeholder="ex: 00:01:30">
        </div>
    </div>

    <div class="buttons">
        <button id="btn-mp3" onclick="iniciarDownload('mp3')">Baixar MP3</button>
        <button id="btn-mp4" onclick="iniciarDownload('mp4')">Baixar MP4</button>
    </div>

    <div id="status"></div>
    <div class="aviso">Ao baixar sem alterar o tempo de fim, o vídeo completo será baixado. O primeiro download pode demorar até 50 segundos para iniciar caso o servidor esteja em repouso.</div>
</div>

<script>
    function iniciarDownload(formato) {
        const urlVideo = document.getElementById('yt-url').value;
        let start = document.getElementById('start-time').value.trim();
        let end = document.getElementById('end-time').value.trim();
        const statusDiv = document.getElementById('status');

        if (!urlVideo) {
            statusDiv.innerText = "Por favor, insira um link válido do YouTube.";
            statusDiv.style.color = "red";
            return;
        }

        // Se o usuário apagar o início, garante que comece do zero
        if (!start) start = "00:00:00";
        
        statusDiv.innerText = "Processando... O download começará automaticamente em instantes.";
        statusDiv.style.color = "#333";

        // URL base do seu servidor no Render
        const BASE_URL = "https://meu-downloader-api.onrender.com";
        
        // Monta a URL de chamada. Se houver tempo de fim, adiciona o parâmetro.
        let urlChamada = `${BASE_URL}/download?url=${encodeURIComponent(urlVideo)}&start=${start}&format=${formato}`;
        if (end) {
            urlChamada += `&end=${end}`;
        }

        // O navegador fará a requisição e começará a baixar o arquivo gerado
        window.location.href = urlChamada;
        
        setTimeout(() => {
            statusDiv.innerText = "";
        }, 10000); // Limpa a mensagem após 10 segundos
    }
</script>

</body>
</html>
